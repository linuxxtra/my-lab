<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINUXXTRA AI V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        :root { --bg: #0a0a0c; --panel: #141417; --accent: #00f2ff; --text: #e0e0e6; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; }
        #sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; }
        #sidebar.collapsed { width: 0; overflow: hidden; border: none; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #msgs { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 20px; gap: 20px; }
        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-top: 30px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: #1a1a1e; }
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #222; }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--panel); border-radius: 16px; padding: 12px; display: flex; align-items: flex-end; gap: 10px; border: 1px solid #333; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; font-size: 16px; max-height: 200px; padding: 8px; outline: none; }
        button { background: var(--accent); border: none; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; color: black; font-weight: bold; }
        .msg.user { align-self: flex-end; background: #222; padding: 12px 18px; border-radius: 18px 18px 2px 18px; max-width: 80%; }
        .msg.ai { align-self: flex-start; display: flex; gap: 15px; width: 100%; }
        .msg-av { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--accent); color: black; font-size: 12px; }
        pre { background: #000 !important; border-radius: 8px; padding: 15px; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="padding: 20px;">
            <h3>LX CONFIG</h3>
            <input type="password" id="api-key" placeholder="Gemini API Key" style="width:100%; background:#222; color:white; border:1px solid #444; padding:8px; border-radius:5px;">
            <div id="key-status-text" style="font-size:10px; margin-top:5px; color:gray;">No Key Found</div>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div id="chat-history"></div>
            <button onclick="newChat()" style="width:100%; margin-top:10px;">+ NEW CHAT</button>
        </div>
    </div>
    <div class="main">
        <div id="welcome" class="welcome">
            <h1>LINUXXTRA <span style="color:var(--accent)">AI V2</span></h1>
            <p>Mastering Linux, Coding & Cybersecurity</p>
            <div class="grid">
                <div class="card" onclick="injectPrompt('Write an elite Python script for automated network scanning using scapy.')">
                    <h4>Elite Coding</h4>
                    <p>Production-ready scripts</p>
                </div>
                <div class="card" onclick="injectPrompt('Explain how to set up a secure proot-distro Ubuntu in Termux.')">
                    <h4>Linux Mastery</h4>
                    <p>System admin & Kernels</p>
                </div>
            </div>
        </div>
        <div id="msgs"></div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="textarea" placeholder="Enter command..." rows="1"></textarea>
                <button id="send-btn" onclick="send()">↑</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        const S = {
            apiKey: localStorage.getItem('lx_key') || '',
            model: 'gemini-2.0-flash-exp',
            messages: [],
            busy: false
        };

        const SYSTEM = "You are LINUXXTRA. Elite programmer and Cybersecurity expert. Provide complete, commented, bug-free code.";

        if(S.apiKey) { document.getElementById('api-key').value = S.apiKey; document.getElementById('key-status-text').innerText = "Key Loaded"; }

        document.getElementById('api-key').addEventListener('input', (e) => {
            S.apiKey = e.target.value;
            localStorage.setItem('lx_key', S.apiKey);
            document.getElementById('key-status-text').innerText = "Key Updated";
        });

        function injectPrompt(txt) {
            document.getElementById('textarea').value = txt;
            send();
        }

        async function send() {
            const ta = document.getElementById('textarea');
            const val = ta.value.trim();
            if(!val || S.busy) return;

            if(!S.apiKey) return alert("Add API Key in sidebar first!");

            document.getElementById('welcome').style.display = 'none';
            document.getElementById('msgs').style.display = 'flex';
            
            addMsg('user', val);
            ta.value = '';
            S.busy = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${S.model}:generateContent?key=${S.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{role: 'user', parts: [{text: SYSTEM + "\n\nUser: " + val}]}]
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                addMsg('ai', reply);
            } catch(e) {
                addMsg('ai', "ERROR: Check API key or connection.");
            }
            S.busy = false;
        }

        function addMsg(role, text) {
            const container = document.getElementById('msgs');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            if(role === 'ai') {
                div.innerHTML = `<div class="msg-av">LX</div><div class="msg-body">${formatText(text)}</div>`;
            } else {
                div.innerText = text;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            Prism.highlightAll();
        }

        function formatText(t) {
            return t.replace(/```(\w+)?\n([\s\S]+?)
```/g, '<pre><code class="language-$1">$2</code></pre>').replace(/\n/g, '<br>');
        }

        function newChat() { location.reload(); }
    </script>
</body>
</html>
