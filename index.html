<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Abdullah's Math Quiz</title>
                <style>
                        body {
                        	            background-color: #001a00;
                        	                        background-image: url('https://w.wallhaven.cc/full/8o/wallhaven-8o9m7y.jpg');
                        	                                    background-size: cover;
                        	                                                background-position: center;
                        	                                                            background-attachment: fixed;
                        	                                                                        color: #2ecc71;
                        	                                                                                    font-family: 'Courier New', Courier, monospace;
                        	                                                                                                text-align: center;
                        	                                                                                                            margin: 0;
                        	                                                                                                                        display: flex;
                        	                                                                                                                                    align-items: center;
                        	                                                                                                                                                justify-content: center;
                        	                                                                                                                                                            height: 100vh;
                        	                                                                                                                                                                        overflow: hidden;
                        	                                                                                                                                                                                }
                        	                                                                                                                                                                                        .container {
                        	                                                                                                                                                                                        	            background: rgba(0, 0, 0, 0.85);
                        	                                                                                                                                                                                        	                        padding: 30px;
                        	                                                                                                                                                                                        	                                    border-radius: 10px;
                        	                                                                                                                                                                                        	                                                border: 2px solid #2ecc71;
                        	                                                                                                                                                                                        	                                                            width: 90%;
                        	                                                                                                                                                                                        	                                                                        max-width: 500px;
                        	                                                                                                                                                                                        	                                                                                    box-shadow: 0 0 20px #2ecc71;
                        	                                                                                                                                                                                        	                                                                                            }
                        	                                                                                                                                                                                        	                                                                                                    h1 { color: #fff; text-shadow: 0 0 10px #2ecc71; }
                        	                                                                                                                                                                                        	                                                                                                            button {
                        	                                                                                                                                                                                        	                                                                                                            	            background: #2ecc71;
                        	                                                                                                                                                                                        	                                                                                                            	                        border: none;
                        	                                                                                                                                                                                        	                                                                                                            	                                    padding: 15px 25px;
                        	                                                                                                                                                                                        	                                                                                                            	                                                font-size: 1.1rem;
                        	                                                                                                                                                                                        	                                                                                                            	                                                            color: black;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                        font-weight: bold;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                    cursor: pointer;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                margin: 10px;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                            border-radius: 5px;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                        width: 80%;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                        button:hover { background: #27ae60; transform: scale(1.05); }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                #jumpscare {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	            display: none;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                        position: fixed;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                    top: 0; left: 0;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                width: 100%; height: 100%;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                            background: black;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                        z-index: 10000;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                        #jumpscare img { width: 100%; height: 100%; object-fit: cover; }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                .hidden { display: none; }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                        #timer { font-size: 3rem; color: #ff0000; }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                            </style>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                            </head>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                            <body>

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                <div id="home" class="container">
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                        <h1>MATH QUIZ</h1>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                <p>Made by Abdullah :^)</p>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                        <button onclick="startQuiz()">START GAME</button>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                            </div>

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                <div id="quiz-container" class="container hidden">
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                        <h2 id="question">Question</h2>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                <div id="options"></div>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                    </div>

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                        <div id="result-screen" class="container hidden">
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                <h2>CONGRATS!</h2>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                        <p>Thank you for playing this game</p>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                <p>Calculating results in...</p>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                        <h1 id="timer">5</h1>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                            </div>

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                <div id="final-stats" class="container hidden">
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                        <h2>FINAL RESULT</h2>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                <p id="score-text"></p>
                       	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                        <button onclick="location.reload()">REPLAY</button>   
                   	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                    	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                  	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                         	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                
<div id="jumpscare" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000;">
    <img src="https://raw.githubusercontent.com/Aris-T2/jumpscare/main/scary_face.jpg" style="width:100%; height:100%; object-fit:cover;">
    <audio id="scary-sound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_783d4a0379.mp3"></audio>
</div>
                 	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                    </div>                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                        <script>
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                const questions = [
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	            { q: "10 + 10", a: [20, 12, 22, 10], c: 20 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                        { q: "15 - 5", a: [5, 10, 20, 25], c: 10 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                    { q: "4 × 3", a: [12, 7, 14, 16], c: 12 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                { q: "20 ÷ 4", a: [4, 5, 10, 2], c: 5 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                            { q: "50 + 50", a: [100, 90, 110, 150], c: 100 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                        { q: "9 × 9", a: [72, 81, 99, 18], c: 81 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                    { q: "100 ÷ 2", a: [25, 50, 75, 5], c: 50 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                { q: "12 + 8", a: [20, 18, 22, 14], c: 20 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                            { q: "30 - 15", a: [15, 10, 20, 5], c: 15 },
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                        { q: "8 × 2", a: [16, 14, 18, 10], c: 16 }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                ];

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                        let currentIdx = 0;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                let score = 0;

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        function startQuiz() {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	            document.getElementById('home').classList.add('hidden');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                        document.getElementById('quiz-container').classList.remove('hidden');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                    showQuestion();
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                            }

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    function showQuestion() {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	            const q = questions[currentIdx];
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                        document.getElementById('question').innerText = q.q;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                    const optDiv = document.getElementById('options');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                optDiv.innerHTML = '';
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            q.a.forEach(opt => {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                const btn = document.createElement('button');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                btn.innerText = opt;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                btn.onclick = () => checkAnswer(opt);
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                optDiv.appendChild(btn);
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                            });
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                    }

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            function checkAnswer(picked) {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            if (picked === questions[currentIdx].c) {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                score++;
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                next();
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            } else {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                triggerJumpscare();
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                            }
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                                    }

                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                                            function triggerJumpscare() {
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                                            	            const js = document.getElementById('jumpscare');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                                            	                        const snd = document.getElementById('scary-sound');
                        	                                                                                                                                                                                        	                                                                                                            	                                                                                                                                                	                                                                                                                                                                                                                                                                                	                                                                                                                                                        	                                                    	                                                            	                                                                                            	            	                                            	                                            	                                    js.style.display = 'block';
