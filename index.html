<script>
/* ═══════════════════════════════════════════
   LINUXXTRA AI V2 — CORE ENGINE
   ═══════════════════════════════════════════ */

// ── STATE ──
const S = {
  apiKey: 'AIzaSyATQcAPE1GHoDJTB3S9JUYRD_9uq6eoIlQ', // 00: REGENERATE THIS TOKEN LATER!
  model: 'gemini-2.0-flash-exp',
  temperature: 0.7,
  maxTokens: 8192,
  contextWindow: 15,
  messages: [],        
  chats: [],           
  currentId: null,
  busy: false,
  tokenEst: 0,
  sidebarOpen: window.innerWidth > 900
};

// ── SYSTEM PROMPT — MASTERY MODE ──
const SYSTEM = `You are LINUXXTRA — an elite, frontier-grade AI with absolute mastery over:
- All programming languages, Linux systems, Cybersecurity, and DevOps.
CRITICAL RULES:
1. ALL code must be complete and production-ready.
2. Every code block must have inline comments.
3. Zero syntax errors permitted.`;

// ── INIT ──
function init() {
  loadLS();
  bindTextarea();
  renderHistory();
  updateStats();
  if (S.apiKey) {
    document.getElementById('api-key').value = S.apiKey;
    setKeyStatus(true, 'Key ready');
  }
}

function loadLS() {
  try {
    const d = JSON.parse(localStorage.getItem('lx_v2') || '{}');
    if (d.apiKey) { S.apiKey = d.apiKey; document.getElementById('api-key').value = d.apiKey; }
    if (d.model) { S.model = d.model; document.getElementById('model-select').value = d.model; }
    if (d.temp !== undefined) { S.temperature = d.temp; document.getElementById('temp').value = d.temp; document.getElementById('temp-val').textContent = d.temp; }
    if (d.tokens) { S.maxTokens = d.tokens; document.getElementById('tokens').value = d.tokens; document.getElementById('tok-val').textContent = parseInt(d.tokens).toLocaleString(); }
    if (d.ctx) { S.contextWindow = d.ctx; document.getElementById('ctx').value = d.ctx; document.getElementById('ctx-val').textContent = d.ctx + ' msgs'; }
    if (d.chats) S.chats = d.chats;
  } catch(e) {}
}

function saveLS() {
  try {
    localStorage.setItem('lx_v2', JSON.stringify({
      apiKey: S.apiKey,
      model: S.model,
      temp: S.temperature,
      tokens: S.maxTokens,
      ctx: S.contextWindow,
      chats: S.chats.slice(-40)
    }));
  } catch(e) {}
}

// ── UI BINDINGS ──
document.getElementById('api-key').addEventListener('input', function() {
  S.apiKey = this.value.trim();
  setKeyStatus(S.apiKey.length > 10, S.apiKey.length > 10 ? 'Key ready' : 'Key too short');
  saveLS();
});

document.getElementById('model-select').addEventListener('change', function() {
  S.model = this.value;
  document.getElementById('model-pill').textContent = this.options[this.selectedIndex].text.split(' ')[0] + ' ' + this.options[this.selectedIndex].text.split(' ')[1];
  saveLS();
});

document.getElementById('temp').addEventListener('input', function() { S.temperature = parseFloat(this.value); saveLS(); });
document.getElementById('tokens').addEventListener('input', function() { S.maxTokens = parseInt(this.value); saveLS(); });
document.getElementById('ctx').addEventListener('input', function() { S.contextWindow = parseInt(this.value); saveLS(); });

function bindTextarea() {
  const ta = document.getElementById('textarea');
  ta.addEventListener('input', function() {
    this.style.height = '24px';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
    document.getElementById('char-counter').textContent = this.value.length + ' CHARS';
  });
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
}

function setKeyStatus(ok, msg) {
  const dot = document.getElementById('key-dot');
  const txt = document.getElementById('key-status-text');
  dot.className = 'key-dot ' + (ok ? 'ok' : 'bad');
  txt.textContent = msg;
}

function toggleKeyVis() {
  const inp = document.getElementById('api-key');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 900) {
    sb.classList.toggle('open');
    sb.classList.remove('collapsed');
  } else {
    sb.classList.toggle('collapsed');
  }
}

// ── SEND ──
async function send() {
  if (S.busy) return;
  const ta = document.getElementById('textarea');
  const text = ta.value.trim();
  if (!text) return;

  if (!S.apiKey || S.apiKey.length < 10) {
    toast('Enter your API key in the sidebar first', 'err');
    document.getElementById('sidebar').classList.add('open');
    return;
  }

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('msgs').style.display = 'flex';

  addMsg('user', text);
  S.messages.push({ role: 'user', content: text });
  ta.value = '';
  ta.style.height = '24px';
  document.getElementById('char-counter').textContent = '0 CHARS';
  updateStats();

  await generate(text);
}

async function generate(userText) {
  S.busy = true;
  document.getElementById('send-btn').disabled = true;
  pbar(true);

  const typId = addTyping();

  try {
    const ctx = S.messages.slice(-S.contextWindow);
    const apiMsgs = ctx.map(m => ({
      role: m.role === 'user' ? 'user' : 'model',
      parts: [{ text: m.content }]
    }));

    const body = {
      system_instruction: { parts: [{ text: SYSTEM }] },
      contents: apiMsgs,
      generationConfig: {
        temperature: S.temperature,
        maxOutputTokens: S.maxTokens
      }
    };

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${S.model}:generateContent?key=${S.apiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );

    if (!res.ok) throw new Error('API Error');

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;

    removeTyping(typId);
    addMsg('ai', reply);
    S.messages.push({ role: 'model', content: reply });

    S.tokenEst += Math.ceil((userText.length + reply.length) / 4);

    if (!S.currentId) S.currentId = Date.now().toString();
    const title = userText.slice(0, 30);
    const ex = S.chats.find(c => c.id === S.currentId);
    if (ex) { ex.messages = [...S.messages]; }
    else S.chats.unshift({ id: S.currentId, title: title, messages: [...S.messages], ts: Date.now() });
    saveLS();
    renderHistory();

  } catch(err) {
    removeTyping(typId);
    addMsg('ai', `⚠ ERROR: ${err.message}`);
  }

  S.busy = false;
  document.getElementById('send-btn').disabled = false;
  pbar(false);
  updateStats();
}

function addMsg(role, content) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMd(content);
  el.innerHTML = `<div class="msg-av ${role}">${role === 'ai' ? '⚡' : '🧑'}</div>`;
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.appendChild(bubble);
  el.appendChild(body);
  document.getElementById('msgs').appendChild(el);
  el.querySelectorAll('pre code').forEach(b => Prism.highlightElement(b));
  scrollBottom();
}

function addTyping() {
  const id = 'ty_' + Date.now();
  const el = document.createElement('div');
  el.id = id;
  el.className = 'msg ai';
  el.innerHTML = `<div class="msg-av ai">⚡</div><div class="msg-body"><div class="typing"><div class="typing-d"></div><div class="typing-d"></div><div class="typing-d"></div></div></div>`;
  document.getElementById('msgs').appendChild(el);
  scrollBottom();
  return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

function renderMd(raw) {
  let s = raw || '';
  s = s.replace(/```(\w+)?\n?([\s\S]*?)
```/g, (_, lang, code) => {
    return `<div class="code-wrap"><div class="code-head"><span class="code-lang">${lang||'code'}</span></div><pre><code class="language-${lang}">${code.replace(/</g,'&lt;')}</code></pre></div>`;
  });
  return s.replace(/\n/g, '<br>');
}

function injectPrompt(text) {
  const ta = document.getElementById('textarea');
  ta.value = text;
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
  // 00 FIX: Auto-send after injecting
  setTimeout(() => send(), 100);
}

function scrollBottom() {
  const m = document.getElementById('msgs');
  m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
}

function pbar(on) { document.getElementById('pbar').classList.toggle('active', on); }

function updateStats() {
  document.getElementById('msg-count').textContent = S.messages.length;
  document.getElementById('token-est').textContent = S.tokenEst;
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-n ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function renderHistory() {
  const h = document.getElementById('chat-history');
  h.innerHTML = '';
  S.chats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'hist-item' + (c.id === S.currentId ? ' active' : '');
    el.textContent = '⚡ ' + c.title;
    el.onclick = () => loadSession(c.id);
    h.appendChild(el);
  });
}

function loadSession(id) {
  const sess = S.chats.find(c => c.id === id);
  if (!sess) return;
  S.currentId = id;
  S.messages = [...sess.messages];
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('msgs').style.display = 'flex';
  S.messages.forEach(m => addMsg(m.role === 'user' ? 'user' : 'ai', m.content));
}

function newChat() {
  S.currentId = null;
  S.messages = [];
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('msgs').style.display = 'none';
  document.getElementById('welcome').style.display = 'flex';
}

function clearAll() { localStorage.removeItem('lx_v2'); location.reload(); }

init();
</script>
</body>
</html>
