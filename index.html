<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7b2fff;
            --cyan: #00f5ff;
            --gold: #ffbd2e;
            --gold2: #d4af37;
            --bg-dark: #060011;
            --terminal-bg: #03000a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes touch box highlight */
            -webkit-touch-callout: none;
            outline: none !important;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            color: white;
            padding: 20px;
        }

        /* Navigation Style */
        #nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(123, 47, 255, 0.1);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(123, 47, 255, 0.2);
        }

        .nav-logo {
            font-weight: bold;
            color: var(--cyan);
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Rajdhani';
            font-weight: 600;
            transition: 0.3s;
            border-radius: 6px;
            user-select: none;
        }

        .nav-btn.active {
            color: white;
            background: var(--purple);
        }

        /* AI Hub Container */
        .ai-container {
            background: rgba(6, 0, 17, 0.95);
            border: 1px solid var(--purple);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(123, 47, 255, 0.2);
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title { font-size: 2rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; }
        .section-sub { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

        .ai-tabs {
            display: flex;
            background: rgba(123, 47, 255, 0.1);
            border-bottom: 1px solid rgba(123, 47, 255, 0.3);
        }

        .ai-tab-btn {
            flex: 1; padding: 15px; border: none; background: none;
            color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace;
            font-size: 12px; cursor: pointer; user-select: none;
        }

        .ai-tab-btn.active { 
            color: var(--cyan); 
            background: rgba(0, 245, 255, 0.1); 
            box-shadow: inset 0 -2px 0 var(--cyan); 
        }

        .ai-tab-content { display: none; padding: 20px; }
        .ai-tab-content.active { display: block; }

        /* Terminal Style */
        .terminal-header { 
            background: #1a0033; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border-radius: 8px 8px 0 0; 
        }
        .terminal-header .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .terminal-header .title { margin-left: 10px; font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'JetBrains Mono'; }

        .terminal-body {
            height: 380px; overflow-y: auto; background: var(--terminal-bg);
            padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
            line-height: 1.6; border: 1px solid rgba(123, 47, 255, 0.3); border-top: none;
        }

        .ai-msg { color: var(--cyan); margin-bottom: 15px; }
        .user-msg { color: var(--gold); margin-bottom: 15px; }
        .system-msg { color: #666; font-style: italic; font-size: 12px; margin-bottom: 10px; }

        .terminal-input-area {
            display: flex; align-items: center; background: #0a0020;
            padding: 15px; border: 1px solid rgba(123, 47, 255, 0.3); border-top: none;
        }
        .terminal-input-area .prompt { color: var(--purple); font-weight: bold; margin-right: 10px; user-select: none; }
        .terminal-input-area input {
            flex: 1; background: transparent; border: none; color: white;
            font-family: 'JetBrains Mono'; font-size: 14px;
        }

        .send-btn { 
            background: var(--purple); color: white; border: none; 
            padding: 8px 20px; border-radius: 4px; cursor: pointer; 
            font-family: 'JetBrains Mono'; font-weight: bold; user-select: none;
        }

        /* Vision Styles */
        .vision-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .vision-input-group input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--purple);
            padding: 12px; color: white; border-radius: 8px; font-family: 'Rajdhani';
        }
        .gen-btn { 
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: black; border: none; padding: 0 25px; border-radius: 8px;
            font-weight: bold; cursor: pointer; user-select: none;
        }
        .vision-result {
            height: 320px; background: rgba(0,0,0,0.4); border: 2px dashed rgba(123, 47, 255, 0.3);
            border-radius: 12px; display: flex; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="nav-logo">LinuXxtra</div>
        <button class="nav-btn active">⌂ Home</button>
        <button class="nav-btn">📖 Chapters</button>
        <button class="nav-btn">🤖 AI Hub</button>
    </nav>

    <div class="section" id="section-ai-hub">
        <div class="section-title">LinuXxtra Neural Core</div>
        <div class="section-sub">// user: abdullah // mode: root_access</div>
        
        <div class="ai-container">
            <div class="ai-tabs">
                <button class="ai-tab-btn active" onclick="switchAITab('chat')">TERMINAL</button>
                <button class="ai-tab-btn" onclick="switchAITab('vision')">IMAGE GEN</button>
            </div>

            <div id="ai-chat-core" class="ai-tab-content active">
                <div class="terminal-header">
                    <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                    <span class="title">abdullah@linuxxtra:~/neural_core</span>
                </div>
                <div id="chat-output" class="terminal-body">
                    <div class="system-msg">[SYSTEM] LinuXxtra Kernel v3.0.1 Loaded...</div>
                    <div class="ai-msg">LinuXxtra AI: Core initialized. Standing by for commands, Master Abdullah.</div>
                </div>
                <div class="terminal-input-area">
                    <span class="prompt">root#</span>
                    <input type="text" id="ai-input" placeholder="Enter command..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="send-btn">RUN</button>
                </div>
            </div>

            <div id="ai-vision-core" class="ai-tab-content">
                <div class="vision-input-group">
                    <input type="text" id="vision-prompt" placeholder="Describe the visual data to synthesize...">
                    <button onclick="generateImage()" class="gen-btn">GENERATE</button>
                </div>
                <div id="vision-display" class="vision-result">
                    <div style="color:rgba(255,255,255,0.2); font-family:'JetBrains Mono'">[ NEURAL ENGINE STANDBY ]</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchAITab(type) {
            const tabs = document.querySelectorAll('.ai-tab-btn');
            const contents = document.querySelectorAll('.ai-tab-content');
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if(type === 'chat') {
                tabs[0].classList.add('active');
                document.getElementById('ai-chat-core').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('ai-vision-core').classList.add('active');
            }
        }

        function sendMessage() {
            const input = document.getElementById('ai-input');
            const output = document.getElementById('chat-output');
            const val = input.value.trim();
            if(!val) return;

            output.innerHTML += `<div class="user-msg">root@linuxxtra:~# ${val}</div>`;
            input.value = '';

            setTimeout(() => {
                let response = "";
                const cmd = val.toLowerCase();

                if(cmd === '00') {
                    response = "PROTOCOL 00 ACTIVE: Full cybersecurity and coding mode engaged. Ready to assist, 00.";
                } else if(cmd === 'clear') {
                    output.innerHTML = '<div class="system-msg">[TERMINAL CLEARED]</div>';
                    return;
                } else if(cmd === 'ls') {
                    response = "bin/ &nbsp; docs/ &nbsp; hacker_hub.sh &nbsp; vault.key";
                } else if(cmd.includes('hello')) {
                    response = "System online. Greetings, Abdullah.";
                } else {
                    response = "Command executed. Data stream analysis complete.";
                }

                output.innerHTML += `<div class="ai-msg">LinuXxtra AI: ${response}</div>`;
                output.scrollTop = output.scrollHeight;
            }, 500);
        }

        function generateImage() {
            const display = document.getElementById('vision-display');
            const prompt = document.getElementById('vision-prompt').value;
            if(!prompt) return;

            display.innerHTML = `<div class="ai-msg">SYNTHESIZING: ${prompt.toUpperCase()}...</div>`;
            
            setTimeout(() => {
                display.innerHTML = `<div style="color:var(--gold); font-family:'JetBrains Mono'; padding: 20px; border: 1px dashed var(--gold);">[ PIXEL_GEN_ERROR ]<br>Nano-Banana 2 integration required for live rendering.</div>`;
            }, 1500);
        }
    </script>
</body>
</html>
